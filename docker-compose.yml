services:
  dns-modem-watchdog:
    build: .
    image: dns-modem-watchdog:latest
    container_name: dns-modem-watchdog
    restart: unless-stopped
    # Required for the active DHCP DISCOVER probe: it needs to see LAN
    # broadcast traffic directly, which the default bridge network can't
    # provide.
    network_mode: host
    cap_add:
      - NET_RAW
    env_file:
      - .env
    volumes:
      - watchdog-data:/data

volumes:
  watchdog-data:
